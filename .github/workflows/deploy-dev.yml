name: Deploy Dev

on:
  workflow_run:
    workflows: ["CI"]
    branches: [develop]
    types: [completed]

jobs:
  deploy:
    name: Deploy to Dev (port 8080)
    runs-on: ubuntu-latest
    environment: development
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy to dev via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io \
              -u ${{ github.event.workflow_run.head_repository.owner.login }} \
              --password-stdin

            cd ${{ secrets.DEPLOY_DIR }}
            git fetch origin develop
            git checkout develop
            git pull origin develop

            REGISTRY=ghcr.io/${{ github.event.workflow_run.head_repository.owner.login }} \
            IMAGE_TAG=${{ github.event.workflow_run.head_sha }} \
            bash scripts/deploy.sh dev

            docker logout ghcr.io
